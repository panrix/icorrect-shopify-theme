<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>iCorrect — Quote Wizard (Full Module)</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />

  <style>
    @font-face { font-family: "Geist"; src: url("fonts/Geist-Variable.woff2") format("woff2"); font-weight: 100 900; font-style: normal; font-display: swap; }
    @font-face { font-family: "Geist Mono"; src: url("fonts/GeistMono-Variable.woff2") format("woff2"); font-weight: 100 900; font-style: normal; font-display: swap; }
    :root { --font-sans: "Geist", Arial, sans-serif; --font-mono: "Geist Mono", ui-monospace, SFMono-Regular, monospace; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; background: #fff; color: #171717; font-family: var(--font-sans); -webkit-font-smoothing: antialiased; font-feature-settings: "liga"; }
    input:focus-visible, button:focus-visible { outline: 2px solid hsla(212, 100%, 48%, 1); outline-offset: 2px; }

    /* ── Shared tokens ───────────────────────────────────────── */
    .qw-mono { font-family: var(--font-mono); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; color: #666; }
    .qw-section-label { font: 500 11px var(--font-mono); text-transform: uppercase; letter-spacing: 0.06em; color: #666; margin: 4px 0 10px; }
    .qw-section-label-sub { margin-top: 14px; }

    /* ── Buttons ──────────────────────────────────────────────── */
    .qw-btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: 0; cursor: pointer; padding: 12px 20px; border-radius: 8px; font: 500 15px/1 var(--font-sans); transition: background 150ms, color 150ms, box-shadow 150ms; text-decoration: none; }
    .qw-btn-dark { background: #171717; color: #fff; }
    .qw-btn-dark:hover { background: #333; }
    .qw-btn-lg { padding: 16px 28px; font-size: 16px; border-radius: 10px; }
    .qw-btn-prompt { background: #f5f5f5; color: #171717; cursor: not-allowed; }
    .qw-btn-back { background: none; border: 0; font: 500 13px var(--font-sans); color: #666; cursor: pointer; padding: 0; margin-bottom: 12px; }
    .qw-btn-back:hover { color: #171717; }

    /* ── Page wrapper ─────────────────────────────────────────── */
    .qw-page { max-width: 820px; margin: 0 auto; padding: 48px 24px 80px; }
    @media (max-width: 640px) { .qw-page { padding: 24px 16px 64px; } }

    /* ── Step animation ───────────────────────────────────────── */
    .qw-step { animation: qwFadeIn 200ms ease-out; }
    @keyframes qwFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .qw-step-title { font: 600 28px/1.15 var(--font-sans); letter-spacing: -1.12px; margin: 0 0 6px; color: #171717; }
    .qw-step-sub { font: 400 15px/1.5 var(--font-sans); color: #4d4d4d; margin: 0 0 20px; }

    /* ── Progress dots ────────────────────────────────────────── */
    .qw-progress { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .qw-progress-top { display: flex; justify-content: space-between; align-items: center; }
    .qw-dots { display: flex; align-items: center; gap: 0; flex-wrap: wrap; row-gap: 6px; }
    .qw-dot { display: flex; align-items: center; gap: 6px; padding: 5px 10px 5px 5px; border-radius: 9999px; box-shadow: 0 0 0 1px rgba(0,0,0,0.08); background: #fff; margin-right: 6px; border: 0; cursor: pointer; font-family: var(--font-sans); color: #171717; transition: box-shadow 150ms; }
    .qw-dot:disabled { cursor: default; opacity: 0.55; }
    .qw-dot:not(:disabled):hover { box-shadow: 0 0 0 1px rgba(0,0,0,0.24); }
    .qw-dot.done { background: #171717; color: #fff; box-shadow: none; }
    .qw-dot.done:not(:disabled):hover { background: #333; }
    .qw-dot.current { box-shadow: 0 0 0 2px #171717; }
    .qw-dot.done .qw-dot-label { text-decoration: underline; text-decoration-color: rgba(255,255,255,0.35); text-underline-offset: 2px; }
    .qw-dot-num { width: 18px; height: 18px; border-radius: 50%; background: #fafafa; box-shadow: 0 0 0 1px rgba(0,0,0,0.08); display: flex; align-items: center; justify-content: center; font: 600 10px var(--font-mono); }
    .qw-dot.done .qw-dot-num { background: #fff; color: #171717; box-shadow: none; }
    .qw-dot-label { font: 500 12px var(--font-sans); }

    /* ── Device grid ──────────────────────────────────────────── */
    .qw-device-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    @media (max-width: 640px) { .qw-device-grid { grid-template-columns: repeat(2, 1fr); } }
    .qw-device-card {
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
      padding: 24px 12px; border: 0; background: #fff; border-radius: 12px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.08), 0 2px 2px rgba(0,0,0,0.04), inset 0 0 0 1px #fafafa;
      cursor: pointer; transition: box-shadow 150ms, transform 150ms; font-family: var(--font-sans);
    }
    .qw-device-card:hover { box-shadow: 0 0 0 1px #171717, 0 2px 8px rgba(0,0,0,0.06); transform: translateY(-2px); }
    .qw-device-card:active { transform: scale(0.97); }
    .qw-device-card.selected { box-shadow: 0 0 0 2px #171717; }
    .qw-device-icon { width: 36px; height: 36px; color: #171717; }
    .qw-device-icon svg { width: 100%; height: 100%; }
    .qw-device-name { font: 600 14px var(--font-sans); letter-spacing: -0.28px; color: #171717; }

    /* ── Model accordion ─────────────────────────────────────── */
    .qw-model-groups { display: flex; flex-direction: column; gap: 6px; }
    .qw-model-group { border-radius: 10px; overflow: hidden; box-shadow: 0 0 0 1px rgba(0,0,0,0.08); background: #fff; }
    .qw-model-group-head {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 14px 18px; cursor: pointer; border: 0; background: transparent; width: 100%;
      text-align: left; font-family: var(--font-sans); transition: background 150ms;
    }
    .qw-model-group-head:hover { background: #fafafa; }
    .qw-model-group-name { font: 600 15px var(--font-sans); letter-spacing: -0.3px; color: #171717; }
    .qw-model-group-count { font: 400 12px var(--font-sans); color: #808080; margin-top: 2px; }
    .qw-model-chev { width: 18px; height: 18px; color: #808080; flex-shrink: 0; transition: transform 250ms ease; }
    .qw-model-group.open .qw-model-chev { transform: rotate(180deg); }

    .qw-model-list { padding: 0 14px 14px; display: flex; flex-direction: column; gap: 2px; }
    .qw-model-item {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 12px 14px; border-radius: 8px; border: 0; background: transparent; width: 100%;
      text-align: left; cursor: pointer; font-family: var(--font-sans); transition: background 150ms;
    }
    .qw-model-item:hover { background: #f5f6fa; }
    .qw-model-item.selected { background: #f0f7ff; box-shadow: inset 0 0 0 1.5px #0070f3; }
    .qw-model-item-name { font: 500 14px var(--font-sans); color: #171717; line-height: 1.3; flex: 1; min-width: 0; }
    .qw-model-item-year { font: 500 12px var(--font-mono); color: #808080; white-space: nowrap; flex-shrink: 0; }

    /* ── Fault grid ──────────────────────────────────────────── */
    .qw-fault-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    @media (max-width: 720px) { .qw-fault-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 480px) { .qw-fault-grid { grid-template-columns: repeat(2, 1fr); } }
    .qw-fault-card {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 20px 10px; border: 0; background: #fff; border-radius: 10px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.08); cursor: pointer; text-align: center;
      transition: box-shadow 150ms, transform 150ms; font-family: var(--font-sans);
    }
    .qw-fault-card:hover { box-shadow: 0 0 0 1px #171717, 0 2px 8px rgba(0,0,0,0.06); transform: translateY(-1px); }
    .qw-fault-card:active { transform: scale(0.97); }
    .qw-fault-card.selected { box-shadow: 0 0 0 2px #171717; }
    .qw-fault-icon { width: 28px; height: 28px; color: #4d4d4d; }
    .qw-fault-card.selected .qw-fault-icon { color: #171717; }
    .qw-fault-name { font: 600 13px var(--font-sans); letter-spacing: -0.26px; color: #171717; line-height: 1.3; }

    /* ── Issue / troubleshoot list ────────────────────────────── */
    .qw-issue-list { display: flex; flex-direction: column; gap: 6px; }
    .qw-issue-card {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 16px 18px; border: 0; background: #fff; border-radius: 10px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.08); cursor: pointer; text-align: left;
      width: 100%; font-family: var(--font-sans); transition: box-shadow 150ms, background 150ms;
    }
    .qw-issue-card:hover { box-shadow: 0 0 0 1px rgba(0,0,0,0.3); }
    .qw-issue-card.selected { box-shadow: 0 0 0 2px #171717; background: #fafafa; }
    .qw-issue-icon-wrap {
      width: 36px; height: 36px; border-radius: 8px; background: #fafafa;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #4d4d4d;
    }
    .qw-issue-card.selected .qw-issue-icon-wrap { background: #f0f7ff; color: #171717; }
    .qw-issue-text { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .qw-issue-label { font: 600 14px var(--font-sans); letter-spacing: -0.28px; color: #171717; }
    .qw-issue-hint { font: 400 13px/1.4 var(--font-sans); color: #666; }

    /* ── Summary card ─────────────────────────────────────────── */
    .qw-summary { background: #fafafa; border-radius: 10px; padding: 20px; box-shadow: 0 0 0 1px rgba(0,0,0,0.06); margin-bottom: 20px; }
    .qw-summary-line { display: flex; justify-content: space-between; gap: 12px; padding: 8px 0; font: 400 14px var(--font-sans); color: #4d4d4d; box-shadow: inset 0 -1px 0 rgba(0,0,0,0.04); }
    .qw-summary-line:last-of-type { box-shadow: none; }
    .qw-summary-line span:first-child { flex-shrink: 0; }
    .qw-summary-line span:last-child { color: #171717; font-weight: 500; text-align: right; }
    .qw-diagnosis-note { margin-top: 12px; padding: 12px 14px; background: #ebf5ff; border-radius: 8px; font: 400 13px/1.5 var(--font-sans); color: #0068d6; }
    .qw-diagnosis-note strong { color: #00489e; }

    /* ── Confirmation check ───────────────────────────────────── */
    .qw-check { width: 56px; height: 56px; border-radius: 50%; background: #171717; color: #fff; display: flex; align-items: center; justify-content: center; font: 600 28px var(--font-sans); margin: 0 auto 16px; }
    .qw-payload-pre { text-align: left; background: #fafafa; padding: 20px; border-radius: 10px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06); font-size: 13px; font-family: var(--font-mono); overflow: auto; max-height: 400px; color: #171717; line-height: 1.6; }

    /* ── Service mapper styles ────────────────────────────────── */
    .qw-postcode-card { margin-bottom: 16px; padding: 14px 14px 12px; background: #fff; border-radius: 10px; box-shadow: inset 0 0 0 2px #171717; transition: box-shadow 160ms ease, background 160ms ease; }
    .qw-postcode-card-resolved { background: #fafafa; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06); }
    .qw-postcode-label { display: flex; flex-direction: column; gap: 2px; margin-bottom: 10px; font: 600 13px var(--font-sans); color: #171717; }
    .qw-postcode-hint { font: 400 12px var(--font-sans); color: #808080; }
    .qw-postcode-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .qw-postcode-input { flex: 1 1 220px; min-width: 0; padding: 11px 13px; border: 0; border-radius: 8px; background: #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.12); font: 600 14px var(--font-mono); letter-spacing: 0.04em; color: #171717; text-transform: uppercase; }
    .qw-postcode-input::placeholder { color: #b8b8b8; text-transform: none; letter-spacing: 0; font-weight: 400; }
    .qw-postcode-input:focus { box-shadow: 0 0 0 2px #171717; outline: none; }
    .qw-postcode-warn { margin-top: 10px; padding: 10px 12px; border-radius: 8px; background: #fff8ea; color: #8c5a00; font: 400 13px/1.5 var(--font-sans); }
    .qw-postcode-warn strong { color: #5a3800; }
    .qw-postcode-link { background: none; border: 0; padding: 0; font: inherit; color: #5a3800; text-decoration: underline; cursor: pointer; }
    .qw-postcode-unlocks { list-style: none; margin: 10px 0 0; padding: 0; display: flex; flex-wrap: wrap; gap: 4px 14px; font: 400 12.5px var(--font-sans); color: #4d4d4d; }
    .qw-postcode-unlocks li { display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
    .qw-postcode-unlocks li span[aria-hidden] { color: #1a6b34; font-weight: 700; font-size: 12px; }
    .qw-postcode-unlocks-meta { color: #808080; }

    .qw-delivery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
    @media (max-width: 640px) { .qw-delivery-grid { grid-template-columns: 1fr; } }
    .qw-delivery-card { position: relative; display: flex; align-items: flex-start; gap: 10px; padding: 14px; border: 0; background: #fff; border-radius: 10px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); cursor: pointer; text-align: left; font-family: var(--font-sans); transition: box-shadow 150ms, background 150ms; }
    .qw-delivery-card:hover { box-shadow: inset 0 0 0 1px rgba(0,0,0,0.3); }
    .qw-delivery-card.active { box-shadow: inset 0 0 0 2px #171717; background: #fafafa; }
    .qw-delivery-badge { position: absolute; top: -8px; right: 10px; background: #171717; color: #fff; font: 500 10px var(--font-mono); text-transform: uppercase; letter-spacing: 0.04em; padding: 3px 8px; border-radius: 9999px; }
    .qw-delivery-radio { width: 18px; height: 18px; border-radius: 50%; box-shadow: inset 0 0 0 1.5px rgba(0,0,0,0.2); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; }
    .qw-delivery-card.active .qw-delivery-radio { box-shadow: inset 0 0 0 1.5px #171717; }
    .qw-delivery-radio span { width: 8px; height: 8px; border-radius: 50%; background: transparent; transition: background 150ms; }
    .qw-delivery-card.active .qw-delivery-radio span { background: #171717; }
    .qw-delivery-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .qw-delivery-title { font: 600 14px var(--font-sans); color: #171717; letter-spacing: -0.28px; }
    .qw-delivery-sub { font: 400 12px/1.4 var(--font-sans); color: #666; }
    .qw-delivery-price { font: 600 13px var(--font-mono); color: #171717; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }

    .qw-courier-confirm { margin-bottom: 16px; padding: 12px 14px; border-radius: 8px; background: #e6f6ec; color: #1a6b34; font: 400 13px/1.5 var(--font-sans); box-shadow: inset 0 0 0 1px rgba(26,107,52,0.18); }
    .qw-courier-confirm strong { color: #134d24; font-weight: 600; }

    .qw-delivery-detail { margin-top: 4px; }
    .qw-date-grid { display: grid; grid-template-columns: repeat(8, minmax(0, 1fr)); gap: 6px; }
    @media (max-width: 720px) { .qw-date-grid { grid-template-columns: repeat(4, 1fr); } }
    .qw-date-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 10px 4px; background: #fff; border: 0; border-radius: 8px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); cursor: pointer; transition: box-shadow 120ms, background 120ms; font-family: var(--font-sans); }
    .qw-date-btn:hover { box-shadow: inset 0 0 0 1px rgba(0,0,0,0.3); }
    .qw-date-btn.active { background: #171717; color: #fff; box-shadow: inset 0 0 0 2px #171717; }
    .qw-date-dow { font: 500 10px/1 var(--font-mono); text-transform: uppercase; letter-spacing: 0.04em; color: #808080; }
    .qw-date-btn.active .qw-date-dow { color: rgba(255,255,255,0.6); }
    .qw-date-day { font: 600 18px/1 var(--font-sans); color: #171717; }
    .qw-date-btn.active .qw-date-day { color: #fff; }
    .qw-date-mon { font: 400 10px/1 var(--font-sans); color: #4d4d4d; }
    .qw-date-btn.active .qw-date-mon { color: rgba(255,255,255,0.6); }

    .qw-time-grid { display: grid; grid-template-columns: repeat(8, minmax(0, 1fr)); gap: 6px; margin-top: 10px; }
    @media (max-width: 720px) { .qw-time-grid { grid-template-columns: repeat(4, 1fr); } }
    .qw-time-btn { padding: 9px 4px; background: #fff; border: 0; border-radius: 6px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); font: 500 13px var(--font-mono); color: #171717; cursor: pointer; transition: box-shadow 120ms, background 120ms; }
    .qw-time-btn:hover { box-shadow: inset 0 0 0 1px rgba(0,0,0,0.3); }
    .qw-time-btn.active { background: #171717; color: #fff; box-shadow: inset 0 0 0 2px #171717; }
    .qw-time-btn.full { opacity: 0.4; cursor: not-allowed; text-decoration: line-through; text-decoration-color: rgba(0,0,0,0.3); }
    .qw-time-btn.full:hover { box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); }
    .qw-slot-full { display: block; font: 600 8px var(--font-mono); text-transform: uppercase; letter-spacing: 0.06em; color: #b00; margin-top: 2px; text-decoration: none; }

    .qw-window-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; margin-top: 10px; }
    @media (max-width: 540px) { .qw-window-grid { grid-template-columns: 1fr; } }
    .qw-window-btn { padding: 12px 8px; background: #fff; border: 0; border-radius: 6px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); font: 500 13px var(--font-mono); color: #171717; cursor: pointer; transition: box-shadow 120ms, background 120ms; }
    .qw-window-btn:hover { box-shadow: inset 0 0 0 1px rgba(0,0,0,0.3); }
    .qw-window-btn.active { background: #171717; color: #fff; box-shadow: inset 0 0 0 2px #171717; }

    .qw-turnaround { margin-top: 4px; }
    .qw-turnaround-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .qw-turnaround-card { position: relative; display: flex; flex-direction: column; align-items: flex-start; gap: 4px; padding: 14px 90px 14px 16px; background: #fff; border: 0; border-radius: 10px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); cursor: pointer; text-align: left; transition: box-shadow 120ms, background 120ms; font-family: var(--font-sans); }
    .qw-turnaround-card:hover { box-shadow: inset 0 0 0 1px rgba(0,0,0,0.3); }
    .qw-turnaround-card.active { background: #fafafa; box-shadow: inset 0 0 0 2px #171717; }
    .qw-turnaround-title { font: 600 16px var(--font-sans); letter-spacing: -0.3px; color: #171717; }
    .qw-turnaround-meta { font: 400 13px var(--font-sans); color: #4d4d4d; }
    .qw-turnaround-eta { margin-top: 8px; display: flex; flex-direction: column; gap: 2px; padding: 8px 10px; background: #fff; border-radius: 6px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06); align-self: stretch; }
    .qw-turnaround-card.active .qw-turnaround-eta { background: #f0f7ff; box-shadow: inset 0 0 0 1px rgba(0,112,243,0.18); }
    .qw-turnaround-eta-label { font: 500 10px var(--font-mono); letter-spacing: 0.06em; text-transform: uppercase; color: #808080; }
    .qw-turnaround-eta-date { font: 600 14px var(--font-sans); color: #171717; letter-spacing: -0.2px; }
    .qw-turnaround-badge { position: absolute; top: -8px; right: 12px; background: #171717; color: #fff; font: 500 10px var(--font-mono); text-transform: uppercase; letter-spacing: 0.04em; padding: 3px 8px; border-radius: 4px; }
    .qw-turnaround-price-corner { position: absolute; top: 14px; right: 14px; font: 600 14px var(--font-sans); color: #171717; letter-spacing: -0.2px; white-space: nowrap; }

    .qw-timeline { margin-top: 4px; padding: 16px; border: 1px solid rgba(0,0,0,0.08); border-radius: 12px; background: #fafafa; display: flex; flex-direction: column; gap: 14px; }
    .qw-timeline-head { display: flex; flex-direction: column; gap: 4px; }
    .qw-timeline-promise { font: 400 13px var(--font-sans); color: #4d4d4d; line-height: 1.4; }
    .qw-timeline-steps { list-style: none; margin: 0; padding: 0; position: relative; display: flex; flex-direction: column; gap: 14px; }
    .qw-timeline-steps::before { content: ""; position: absolute; left: 13px; top: 14px; bottom: 14px; width: 2px; background: rgba(0,0,0,0.08); border-radius: 2px; }
    .qw-timeline-step { position: relative; display: grid; grid-template-columns: 28px 1fr; gap: 12px; align-items: flex-start; }
    .qw-timeline-marker { width: 28px; height: 28px; border-radius: 50%; background: #fff; border: 2px solid rgba(0,0,0,0.18); color: #4d4d4d; font: 600 13px var(--font-mono); display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; }

    .qw-timeline-body { padding-top: 2px; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .qw-timeline-label { font: 600 14px var(--font-sans); color: #171717; letter-spacing: -0.2px; line-height: 1.3; }

    .qw-timeline-step-final .qw-timeline-date { font-weight: 600; }

    .qw-bp { display: flex; align-items: center; gap: 0; margin-bottom: 16px; padding: 12px 16px; background: #fafafa; border-radius: 10px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06); }
    .qw-bp-step { display: flex; align-items: center; gap: 6px; opacity: 0.4; transition: opacity 200ms ease; }
    .qw-bp-step.done { opacity: 1; }
    .qw-bp-step.current { opacity: 1; }
    .qw-bp-num { width: 22px; height: 22px; border-radius: 50%; background: #e5e5e5; color: #666; font: 600 11px var(--font-mono); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .qw-bp-step.done .qw-bp-num { background: #171717; color: #fff; }
    .qw-bp-step.current .qw-bp-num { background: #171717; color: #fff; box-shadow: 0 0 0 2px #fff, 0 0 0 4px #171717; }
    .qw-bp-label { font: 500 12px var(--font-sans); color: #4d4d4d; white-space: nowrap; }
    .qw-bp-step.done .qw-bp-label { color: #171717; }
    .qw-bp-step.current .qw-bp-label { color: #171717; font-weight: 600; }
    .qw-bp-line { flex: 1; height: 2px; background: #e5e5e5; margin: 0 8px; min-width: 12px; border-radius: 2px; }

    @keyframes qwNudge { 0%, 100% { box-shadow: 0 0 0 0 rgba(0,112,243,0); } 30% { box-shadow: 0 0 0 4px rgba(0,112,243,0.25); } 60% { box-shadow: 0 0 0 2px rgba(0,112,243,0.12); } }
    .qw-nudge { animation: qwNudge 1.2s ease-out; border-radius: 10px; }
    .qw-fineprint { font: 400 12px/1.5 var(--font-sans); color: #808080; margin: 8px 0 0; }

    .qw-lab-controls { margin-bottom: 16px; padding: 14px; border-radius: 10px; background: #fff; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08); }
    .qw-lab-control-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    .qw-lab-control { display: flex; flex-direction: column; gap: 6px; font: 600 12px var(--font-sans); color: #4d4d4d; }
    .qw-lab-control select { width: 100%; border: 0; border-radius: 8px; padding: 10px 12px; background: #fafafa; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.12); font: 600 13px var(--font-sans); color: #171717; }
    .qw-delivery-grid-lab { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .qw-card-disabled { opacity: 0.45; cursor: not-allowed; }
    .qw-decision-note, .qw-selected-contract, .qw-contract-payload { margin-top: 12px; padding: 14px; border-radius: 10px; background: #fafafa; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08); }
    .qw-decision-note { font: 400 13px/1.5 var(--font-sans); color: #4d4d4d; }
    .qw-decision-note strong { color: #171717; }
    .qw-contract-payload summary { cursor: pointer; font: 600 13px var(--font-sans); color: #171717; }
    .qw-contract-payload pre { margin: 12px 0 0; max-height: 360px; overflow: auto; white-space: pre-wrap; overflow-wrap: anywhere; font: 500 11px/1.55 var(--font-mono); background: #171717; color: #fff; border-radius: 8px; padding: 12px; }

    @media (max-width: 480px) {
      .qw-bp { padding: 10px 12px; }
      .qw-bp-label { font-size: 11px; }
      .qw-bp-num { width: 20px; height: 20px; font-size: 10px; }

      .qw-lab-control-grid, .qw-delivery-grid-lab { grid-template-columns: 1fr; }
    }
