<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MacBook Repairs London · Board-Level Specialists · iCorrect Fitzrovia</title>
  <meta name="description" content="MacBook repair specialists in Fitzrovia, London. Screen, battery, liquid damage, keyboard, trackpad, charging port, and logic board repairs. Genuine Apple parts, 2-year warranty, 48hr average turnaround. Walk-ins welcome." />
  <link rel="stylesheet" href="icorrect/icorrect.css" />
  <link rel="stylesheet" href="icorrect/shell.css" />
  <link rel="stylesheet" href="icorrect/info.css" />
  <link rel="stylesheet" href="icorrect/page.css" />
  <link rel="stylesheet" href="icorrect/wizard.css" />
  <link rel="stylesheet" href="qw/wizard-v3.css" />
  <link rel="stylesheet" href="qw/quote-v6.css" />
  <link rel="stylesheet" href="qw/diagnose.css" />
  <link rel="stylesheet" href="icorrect/macbook-repairs.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="qw/data.js"></script>
  <script type="text/babel" src="icorrect/tweaks-panel.jsx"></script>
  <script type="text/babel" src="icorrect/Shell.jsx"></script>
  <script type="text/babel" src="qw/QuoteTiersV6.jsx"></script>
  <script type="text/babel" src="qw/QuoteModalV7.jsx"></script>
  <script type="text/babel" src="qw/QuoteWizardV3.jsx"></script>
  <script type="text/babel" src="icorrect/MacBookRepairs.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "diagnoseAccent": "#38598C",
      "accentStyle": "filled",
      "recoveryAccent": true
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      React.useEffect(() => {
        document.documentElement.style.setProperty("--diagnose-accent", tweaks.diagnoseAccent);
      }, [tweaks.diagnoseAccent]);

      return (
        <>
          <Nav />
          <MBRBreadcrumb />
          <MBRHero accentColor={tweaks.diagnoseAccent} accentStyle={tweaks.accentStyle} />
          <TrustBand />
          <MBRSpecialist />
          <MBRCaseStudy recovery={tweaks.recoveryAccent} />
          <MBRProcess />
          <MBRWizardSection accentColor={tweaks.diagnoseAccent} accentStyle={tweaks.accentStyle} />
          <MBRTypes />
          <MBRFaults />
          <MBRFAQ />
          <Location />
          <Footer />

          <TweaksPanel title="Accent colour">
            <TweakSection label="Diagnose CTA colour" />
            <TweakColor
              label="Accent"
              value={tweaks.diagnoseAccent}
              onChange={v => setTweak("diagnoseAccent", v)}
              options={["#38598C", "#BC6A2C"]}
            />
            <TweakRadio
              label="Button style"
              value={tweaks.accentStyle}
              onChange={v => setTweak("accentStyle", v)}
              options={[
                { value: "filled", label: "Filled" },
                { value: "outline", label: "Outline" },
              ]}
            />
            <TweakSection label="Recovery accent" />
            <TweakToggle
              label="Orange recovery accent on case study"
              value={tweaks.recoveryAccent}
              onChange={v => setTweak("recoveryAccent", v)}
            />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
