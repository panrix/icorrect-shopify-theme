<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>iCorrect — We repair what they can't · Apple specialists, Fitzrovia London</title>
  <meta name="description" content="Board-level Apple repair specialists in Fitzrovia, London. Microsoldering, liquid damage recovery, and the repairs Apple writes off. Genuine parts, 2-year warranty, 719 five-star Google reviews." />
  <link rel="stylesheet" href="colors_and_type.css" />
  <link rel="stylesheet" href="icorrect/icorrect.css" />
  <link rel="stylesheet" href="icorrect/shell.css" />
  <link rel="stylesheet" href="icorrect/wizard.css" />
  <link rel="stylesheet" href="qw/wizard-v3.css" />
  <link rel="stylesheet" href="qw/quote-v6.css" />
  <link rel="stylesheet" href="qw/diagnose.css" />
  <style>
    .hp-floating-quote { position: fixed; right: 20px; bottom: 20px; z-index: 400; display: inline-flex; align-items: center; gap: 8px;
      background: #171717; color: #fff; border: 0; cursor: pointer; border-radius: 999px; padding: 14px 22px;
      font: 600 15px var(--font-sans); box-shadow: 0 0 0 1px rgba(0,0,0,0.1), 0 14px 30px -10px rgba(0,0,0,0.4); transition: background 150ms, transform 150ms; }
    .hp-floating-quote:hover { background: #333; transform: translateY(-2px); }
    .hp-floating-quote span { font-family: var(--font-mono); transition: transform 200ms; }
    .hp-floating-quote:hover span { transform: translateX(3px); }
  </style>
  <link rel="stylesheet" href="icorrect/homepage.css" />
  <link rel="stylesheet" href="icorrect/hero-variants.css" />
  <link rel="stylesheet" href="icorrect/photo-pass.css" />
  <link rel="stylesheet" href="icorrect/reviews-wall.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="18" fill="#EAF0F8"/><text x="50" y="58" text-anchor="middle" font-family="ui-monospace,monospace" font-weight="700" font-size="26" fill="#38598C">iC</text></svg>
  </template>
  <div id="root"></div>

  <!-- Static preloads so the offline bundler embeds JSX-referenced photos;
       the shim below remaps runtime <img> srcs to the embedded blobs.
       Inert when the page is served normally. -->
  <div id="__asset-preload" hidden aria-hidden="true">
    <img src="uploads/workshop-bench.jpg" data-path="uploads/workshop-bench.jpg" alt="" />
    <img src="uploads/backlight-repair.jpg" data-path="uploads/backlight-repair.jpg" alt="" />
    <img src="uploads/repair-scope.jpg" data-path="uploads/repair-scope.jpg" alt="" />
    <img src="uploads/repair-boardview.jpg" data-path="uploads/repair-boardview.jpg" alt="" />
    <img src="uploads/repair-teardown.jpg" data-path="uploads/repair-teardown.jpg" alt="" />
    <img src="uploads/repair-rework.jpg" data-path="uploads/repair-rework.jpg" alt="" />
  </div>
  <script>
    (function () {
      var pre = document.getElementById("__asset-preload");
      if (!pre) return;
      var map = {};
      pre.querySelectorAll("img[data-path]").forEach(function (im) {
        var cur = im.getAttribute("src");
        if (cur && cur !== im.getAttribute("data-path")) map[im.getAttribute("data-path")] = cur;
      });
      if (!Object.keys(map).length) return;
      // Swap at set-time so the browser never requests the raw path.
      var osa = Element.prototype.setAttribute;
      Element.prototype.setAttribute = function (n, v) {
        if (n === "src" && typeof v === "string" && map[v]) v = map[v];
        return osa.call(this, n, v);
      };
      var d = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, "src");
      if (d && d.set) Object.defineProperty(HTMLImageElement.prototype, "src", {
        get: d.get, configurable: true,
        set: function (v) { d.set.call(this, (typeof v === "string" && map[v]) || v); }
      });
      function fix(root) {
        if (!root || !root.querySelectorAll) return;
        root.querySelectorAll("img").forEach(function (im) {
          var s = im.getAttribute("src");
          if (s && map[s]) im.setAttribute("src", map[s]);
        });
      }
      new MutationObserver(function (muts) {
        muts.forEach(function (m) { m.addedNodes.forEach(fix); });
      }).observe(document.documentElement, { childList: true, subtree: true });
      fix(document);
    })();
  </script>

  <script src="image-slot.js"></script>
  <script src="qw/data.js"></script>
  <script type="text/babel" src="icorrect/tweaks-panel.jsx"></script>
  <script type="text/babel" src="icorrect/TrustCard.jsx"></script>
  <script type="text/babel" src="qw/QuoteTiersV6.jsx"></script>
  <script type="text/babel" src="qw/QuoteModalV7.jsx"></script>
  <script type="text/babel" src="qw/QuoteWizardV3.jsx"></script>
  <script type="text/babel" src="icorrect/Shell.jsx"></script>
  <script type="text/babel" src="icorrect/Placeholders.jsx"></script>
  <script type="text/babel" src="icorrect/Homepage.jsx"></script>
  <script type="text/babel" src="icorrect/HeroVariants.jsx"></script>
  <script type="text/babel" src="icorrect/HomepageSections.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "hero": "C",
      "warmth": 0,
      "reviewCount": 719,
      "rating": 4.9,
      "showProof": true,
      "proofStyle": "reviews",
      "showWizardSection": true,
      "floatingQuote": true,
      "photoPass": false,
      "quoteCalm": true,
      "priceEarly": true,
      "compactProgress": true
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const w = (tweaks.warmth ?? 0) / 100;

      React.useEffect(() => {
        document.documentElement.style.setProperty("--warmth", String(w));
      }, [w]);

      React.useEffect(() => {
        document.body.classList.toggle("q4-calm", !!tweaks.quoteCalm);
      }, [tweaks.quoteCalm]);

      // (diagnose now lives in <DiagnoseModal/>, mounted below)

      // Hide the duplicate Wizard section if the hero already contains one
      const heroHasWizard = tweaks.hero === "wizard" || tweaks.hero === "C";

      return (
        <>
          <Nav />

          <div className="hero-morph is-marketing">
            {tweaks.hero === "workshop" && <HeroWorkshop reviewCount={tweaks.reviewCount} rating={tweaks.rating} />}
            {tweaks.hero === "proof"    && <HeroProof    reviewCount={tweaks.reviewCount} rating={tweaks.rating} />}
            {tweaks.hero === "wizard"   && <HeroWizardInline reviewCount={tweaks.reviewCount} rating={tweaks.rating} />}
            {tweaks.hero === "A" && <HeroA reviewCount={tweaks.reviewCount} rating={tweaks.rating} />}
            {tweaks.hero === "B" && <HeroB reviewCount={tweaks.reviewCount} rating={tweaks.rating} />}
            {tweaks.hero === "C" && <HeroC reviewCount={tweaks.reviewCount} rating={tweaks.rating} priceEarly={tweaks.priceEarly} compactProgress={tweaks.compactProgress} />}
          </div>

          <div className="hp-trust-belowhero">
            <TrustStrip reviewCount={tweaks.reviewCount} rating={tweaks.rating} />
          </div>

          {tweaks.photoPass && <PhotoBand />}

          {tweaks.showProof && (tweaks.proofStyle === "cases"
            ? <ProofSection />
            : <HomeReviewsWall reviewCount={tweaks.reviewCount} rating={tweaks.rating} />)}
          {tweaks.showWizardSection && !heroHasWizard && <WizardSection />}
          <DataSafetySection />
          <PriceConfidenceSection />
          <LondonAccessSection />
          <CorporateSection />
          <HomepageFAQ />
          <FinalCTA />

          <Footer />

          {tweaks.floatingQuote && (
            <button
              type="button"
              className="hp-floating-quote"
              onClick={() => scrollToWizard()}
            >
              Get a quote <span aria-hidden="true">→</span>
            </button>
          )}

          <TweaksPanel title="Homepage tweaks">
            <TweakSection label="Hero" />
            <TweakRadio
              label="Hero variant"
              value={tweaks.hero}
              onChange={v => setTweak("hero", v)}
              options={[
                { value: "A", label: "A · Rebalance" },
                { value: "B", label: "B · Big card" },
                { value: "C", label: "C · Wizard" },
              ]}
            />

            <TweakSection label="Brand" />
            <TweakSlider
              label="Warmth"
              value={tweaks.warmth}
              onChange={v => setTweak("warmth", v)}
              min={0} max={100} step={5}
              unit="%"
            />

            <TweakSection label="Trust band" />
            <TweakNumber
              label="Review count"
              value={tweaks.reviewCount}
              onChange={v => setTweak("reviewCount", v)}
              min={100} max={5000} step={1}
            />
            <TweakSlider
              label="Rating"
              value={tweaks.rating}
              onChange={v => setTweak("rating", v)}
              min={4.5} max={5.0} step={0.1}
            />

            <TweakSection label="Design pass" />
            <TweakToggle
              label="Bench photography"
              value={tweaks.photoPass}
              onChange={v => setTweak("photoPass", v)}
            />
            <TweakToggle
              label="Calm quote screen"
              value={tweaks.quoteCalm}
              onChange={v => setTweak("quoteCalm", v)}
            />
            <TweakToggle
              label="Price before postcode"
              value={tweaks.priceEarly}
              onChange={v => setTweak("priceEarly", v)}
            />
            <TweakToggle
              label="Compact progress pills"
              value={tweaks.compactProgress}
              onChange={v => setTweak("compactProgress", v)}
            />

            <TweakSection label="Sections" />
            <TweakToggle
              label="Show proof section"
              value={tweaks.showProof}
              onChange={v => setTweak("showProof", v)}
            />
            <TweakRadio
              label="Proof style"
              value={tweaks.proofStyle}
              onChange={v => setTweak("proofStyle", v)}
              options={[
                { value: "reviews", label: "Reviews wall" },
                { value: "cases", label: "Case cards" },
              ]}
            />
            <TweakToggle
              label="Show wizard section"
              value={tweaks.showWizardSection}
              onChange={v => setTweak("showWizardSection", v)}
            />
            <TweakToggle
              label="Floating quote button"
              value={tweaks.floatingQuote}
              onChange={v => setTweak("floatingQuote", v)}
            />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);

    // Smoothly bring the wizard into a comfortable view (below the sticky nav)
    // instead of letting #wizard anchors jump it to the very top.
    function scrollToWizard() {
      const el = document.getElementById("wizard") || document.getElementById("wizard-section");
      if (!el) return;
      const y = el.getBoundingClientRect().top + window.scrollY - 88;
      window.scrollTo({ top: Math.max(0, y), behavior: "smooth" });
    }
    window.scrollToWizard = scrollToWizard;
    document.addEventListener("click", (e) => {
      const a = e.target.closest('a[href="#wizard"]');
      if (a) { e.preventDefault(); scrollToWizard(); }
    });

    // Scroll-reveal observer — adds .revealed when elements enter viewport
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("revealed"); revealObserver.unobserve(e.target); } });
    }, { threshold: 0.08, rootMargin: "0px 0px -40px 0px" });
    function observeReveals() {
      document.querySelectorAll(".hp-reveal:not(.revealed)").forEach(el => revealObserver.observe(el));
    }
    requestAnimationFrame(observeReveals);
    new MutationObserver(observeReveals).observe(document.getElementById("root"), { childList: true, subtree: true });
  </script>
</body>
</html>
