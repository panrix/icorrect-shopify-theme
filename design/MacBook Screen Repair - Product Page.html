<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MacBook Pro 16" M3 Screen Repair · iCorrect</title>
  <link rel="stylesheet" href="icorrect/icorrect.css" />
  <link rel="stylesheet" href="icorrect/wizard.css" />
  <link rel="stylesheet" href="icorrect/shell.css" />
  <link rel="stylesheet" href="icorrect/page.css" />
  <link rel="stylesheet" href="icorrect/info.css" />
  <link rel="stylesheet" href="icorrect/product.css" />
  <link rel="stylesheet" href="qw/wizard-v3.css" />
  <link rel="stylesheet" href="qw/quote-v6.css" />
  <style>
    /* Quote-only card in the hero right column */
    .ppq-card { background: #fff; border-radius: 16px; padding: 24px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04), 0 24px 48px -28px rgba(0,0,0,0.2); }
    .ppq-card-label { font: 500 10px var(--font-mono); text-transform: uppercase; letter-spacing: 0.06em; color: #a3a3a3; }
    .ppq-card-price { font: 600 40px var(--font-sans); letter-spacing: -2px; color: #171717; font-feature-settings: "tnum"; line-height: 1.05; margin: 2px 0; }
    .ppq-card-from { font: 400 13px var(--font-sans); color: #808080; }
    .ppq-card-list { list-style: none; margin: 18px 0; padding: 18px 0; display: flex; flex-direction: column; gap: 10px; box-shadow: inset 0 1px 0 rgba(0,0,0,0.08), inset 0 -1px 0 rgba(0,0,0,0.08); }
    .ppq-card-list li { display: flex; align-items: center; gap: 10px; font: 400 14px var(--font-sans); color: #171717; }
    .ppq-card-list .yes { color: #0072f5; font-weight: 700; width: 16px; text-align: center; }
    .ppq-card-cta { width: 100%; border: 0; cursor: pointer; border-radius: 11px; padding: 15px 18px; font: 600 16px var(--font-sans);
      background: #171717; color: #fff; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: background 150ms; }
    .ppq-card-cta:hover { background: #333; }
    .ppq-card-cta span { font-family: var(--font-mono); transition: transform 200ms; }
    .ppq-card-cta:hover span { transform: translateX(3px); }
    .ppq-card-note { text-align: center; font: 400 12px var(--font-sans); color: #a3a3a3; margin: 10px 0 0; }

    /* Modal */
    .pcm-overlay { position: fixed; inset: 0; z-index: 600; background: rgba(15,15,15,0.5); backdrop-filter: blur(3px);
      display: flex; align-items: flex-start; justify-content: center; padding: 32px 16px; overflow-y: auto; animation: pcmFade 160ms ease-out; }
    @keyframes pcmFade { from { opacity: 0; } to { opacity: 1; } }
    .pcm-modal { width: 100%; max-width: 720px; background: #fafafa; border-radius: 18px; box-shadow: 0 30px 70px -20px rgba(0,0,0,0.5);
      animation: pcmRise 200ms cubic-bezier(.16,1,.3,1); margin: auto 0; }
    @keyframes pcmRise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .pcm-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; padding: 20px 24px; box-shadow: inset 0 -1px 0 rgba(0,0,0,0.08); }
    .pcm-eyebrow { font: 500 11px var(--font-mono); text-transform: uppercase; letter-spacing: 0.06em; color: #808080; }
    .pcm-title { font: 600 18px var(--font-sans); letter-spacing: -0.4px; color: #171717; margin-top: 3px; }
    .pcm-close { flex-shrink: 0; width: 34px; height: 34px; border-radius: 999px; border: 0; cursor: pointer; background: #fff; color: #171717;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); font-size: 15px; transition: background 150ms; }
    .pcm-close:hover { background: #ebebeb; }
    .pcm-body { padding: 22px 24px 26px; }

    /* Floating quote pill */
    .ppq-floating { position: fixed; right: 20px; bottom: 20px; z-index: 400; display: inline-flex; align-items: center; gap: 8px;
      background: #171717; color: #fff; border: 0; cursor: pointer; border-radius: 999px; padding: 14px 22px;
      font: 600 15px var(--font-sans); box-shadow: 0 0 0 1px rgba(0,0,0,0.1), 0 14px 30px -10px rgba(0,0,0,0.4); transition: background 150ms, transform 150ms; }
    .ppq-floating:hover { background: #333; transform: translateY(-2px); }
    .ppq-floating span { font-family: var(--font-mono); transition: transform 200ms; }
    .ppq-floating:hover span { transform: translateX(3px); }

    /* ===== New committed-buyer flow sections ===== */
    .symptom .journey-stage, .pricebreak .journey-stage, .genuine .journey-stage, .threeways .journey-stage { white-space: nowrap; }

    /* A. Symptom confirm */
    .symptom-grid { display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 56px; align-items: start; }
    @media (max-width: 880px) { .symptom-grid { grid-template-columns: 1fr; gap: 32px; } }
    .symptom-verdict { margin-top: 26px; padding: 20px 22px; background: #fafafa; border-radius: 14px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.07); }
    .symptom-verdict-key { font: 500 11px var(--font-mono); text-transform: uppercase; letter-spacing: 0.06em; color: #808080; margin-bottom: 7px; }
    .symptom-verdict-val { font: 400 20px var(--font-sans); letter-spacing: -0.4px; color: #171717; }
    .symptom-verdict-val strong { font-weight: 600; font-feature-settings: "tnum"; }
    .symptom-verdict-foot { margin-top: 12px; font: 400 13px/1.55 var(--font-sans); color: #666; }
    .symptom-list { list-style: none; margin: 0; padding: 24px; display: flex; flex-direction: column; gap: 15px; background: #fff; border-radius: 16px; box-shadow: 0 0 0 1px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04), inset 0 0 0 1px #fafafa; }
    .symptom-list li { display: flex; align-items: flex-start; gap: 12px; font: 400 15px/1.4 var(--font-sans); color: #171717; }
    .symptom-tick { flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%; background: #171717; color: #fff; display: flex; align-items: center; justify-content: center; margin-top: 1px; }
    .symptom-tick svg { width: 11px; height: 11px; }

    /* B. Price breakdown */
    .pb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start; }
    @media (max-width: 900px) { .pb-grid { grid-template-columns: 1fr; gap: 32px; } }
    .pb-text p { font: 400 16px/1.6 var(--font-sans); color: #4d4d4d; margin: 0 0 16px; }
    .pb-text p:last-child { margin-bottom: 0; }
    .pb-card { background: #fff; border-radius: 16px; padding: 4px 24px 22px; box-shadow: 0 0 0 1px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04), 0 24px 48px -28px rgba(0,0,0,0.18), inset 0 0 0 1px #fafafa; }
    .pb-card-head { padding: 18px 0 14px; box-shadow: inset 0 -1px 0 rgba(0,0,0,0.08); }
    .pb-card-head-label { font: 500 11px var(--font-mono); text-transform: uppercase; letter-spacing: 0.06em; color: #808080; }
    .pb-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; padding: 15px 0; box-shadow: inset 0 -1px 0 rgba(0,0,0,0.05); }
    .pb-row-main { display: flex; flex-direction: column; gap: 3px; }
    .pb-row-label { font: 500 15px var(--font-sans); color: #171717; letter-spacing: -0.2px; }
    .pb-row-note { font: 400 13px var(--font-sans); color: #808080; }
    .pb-row-inc { flex-shrink: 0; display: inline-flex; align-items: center; gap: 6px; font: 500 11px var(--font-mono); text-transform: uppercase; letter-spacing: 0.04em; color: #3F6B50; white-space: nowrap; }
    .pb-row-inc-tick { width: 16px; height: 16px; border-radius: 50%; background: #EAF1EC; color: #3F6B50; display: inline-flex; align-items: center; justify-content: center; }
    .pb-row-inc-tick svg { width: 9px; height: 9px; }
    .pb-total { display: flex; justify-content: space-between; align-items: baseline; padding: 18px 0 4px; }
    .pb-total-label { font: 500 12px var(--font-mono); text-transform: uppercase; letter-spacing: 0.04em; color: #4d4d4d; }
    .pb-total-val { font: 600 34px var(--font-sans); letter-spacing: -1.6px; color: #171717; font-feature-settings: "tnum"; }

    /* C. Genuine parts */
    .gp-grid { display: grid; grid-template-columns: 0.9fr 1.1fr; gap: 56px; align-items: start; }
    @media (max-width: 900px) { .gp-grid { grid-template-columns: 1fr; gap: 28px; } }
    .gp-text p { font: 400 16px/1.6 var(--font-sans); color: #4d4d4d; margin: 16px 0 0; max-width: 460px; }
    .gp-points { display: flex; flex-direction: column; gap: 12px; }
    .gp-point { display: flex; gap: 16px; padding: 20px; background: #fff; border-radius: 14px; box-shadow: 0 0 0 1px rgba(0,0,0,0.08), inset 0 0 0 1px #fafafa; }
    .gp-point-icon { flex-shrink: 0; width: 40px; height: 40px; border-radius: 10px; background: #fafafa; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08); display: flex; align-items: center; justify-content: center; color: #171717; }
    .gp-point-icon svg { width: 22px; height: 22px; }
    .gp-point-body h3 { font: 600 16px var(--font-sans); letter-spacing: -0.3px; color: #171717; margin: 0 0 5px; }
    .gp-point-body p { font: 400 14px/1.55 var(--font-sans); color: #4d4d4d; margin: 0; }

    /* D. Three ways in */
    .threeways { background: #fafafa; }
    .twi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 32px; }
    @media (max-width: 880px) { .twi-grid { grid-template-columns: 1fr; } }
    .twi-card { background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 0 0 1px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04), inset 0 0 0 1px #fafafa; display: flex; flex-direction: column; gap: 11px; transition: transform 200ms cubic-bezier(.16,1,.3,1), box-shadow 200ms; }
    .twi-card:hover { transform: translateY(-3px); box-shadow: 0 0 0 1px rgba(0,0,0,0.12), 0 18px 36px -16px rgba(0,0,0,0.2), inset 0 0 0 1px #fafafa; }
    .twi-icon { width: 44px; height: 44px; border-radius: 12px; background: #fafafa; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08); display: flex; align-items: center; justify-content: center; color: #171717; margin-bottom: 2px; }
    .twi-icon svg { width: 24px; height: 24px; }
    .twi-title { font: 600 18px var(--font-sans); letter-spacing: -0.4px; color: #171717; }
    .twi-meta { font: 500 11px var(--font-mono); text-transform: uppercase; letter-spacing: 0.05em; color: #808080; }
    .twi-body { font: 400 14px/1.55 var(--font-sans); color: #4d4d4d; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="config-rail">
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="18" fill="#EAF0F8"/><text x="50" y="58" text-anchor="middle" font-family="ui-monospace,monospace" font-weight="700" font-size="26" fill="#38598C">iC</text></svg>
  </template>
  <div id="root"></div>

  <script src="qw/data.js"></script>
  <script type="text/babel" src="icorrect/Shell.jsx"></script>
  <script type="text/babel" src="icorrect/TrustCard.jsx"></script>
  <script type="text/babel" src="icorrect/ProductSections.jsx"></script>
  <script type="text/babel" src="qw/QuoteTiersV6.jsx"></script>
  <script type="text/babel" src="qw/QuoteModalV7.jsx"></script>
  <script type="text/babel" src="qw/QuoteWizardV3.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const PRODUCT = { model: 'MacBook Pro 16" M3', repairLabel: "Screen repair", price: 699 };

    // Hero with the new quote-only card in place of the old configurator.
    function ProductHeroQuote({ onOpen }) {
      const anchors = [
        { num: "01", label: "Is this you?", href: "#symptoms" },
        { num: "02", label: "What's in your price", href: "#price" },
        { num: "03", label: "Behind the bench", href: "#process" },
        { num: "04", label: "Warranty", href: "#warranty" },
        { num: "05", label: "FAQs", href: "#faqs" },
      ];
      return (
        <section className="product-hero" id="product-hero">
          <div className="container">
            <div className="product-hero-grid">
              <div className="product-hero-left">
                <div className="product-hero-eyebrow"><span className="dot" /> MacBook · Screen Repair</div>
                <h1>MacBook Pro 16" M3 Pro/Max screen repair, with True Tone preserved.</h1>
                <p className="product-hero-lede">
                  We replace the A2991 display assembly with a genuine pulled OEM panel — calibrated against a
                  reference sensor before it leaves the bench. Most repairs are completed inside 48 hours,
                  warrantied for two years.
                </p>
                <div className="product-hero-anchors">
                  {anchors.map(a => (
                    <a key={a.num} href={a.href} className="product-hero-anchor">
                      <span className="anchor-num">{a.num}</span>{a.label}
                    </a>
                  ))}
                </div>
              </div>

              <div className="product-hero-right">
                <div className="ph-trustcard"><TrustCard /></div>
                <div className="ppq-card">
                  <div className="ppq-card-label">Screen repair</div>
                  <div className="ppq-card-price">£{PRODUCT.price}</div>
                  <div className="ppq-card-from">Fixed price · delivery &amp; turnaround chosen at quote</div>
                  <ul className="ppq-card-list">
                    <li><span className="yes">✓</span> Genuine Apple display, True Tone calibrated</li>
                    <li><span className="yes">✓</span> 2-year warranty on parts &amp; labour</li>
                    <li><span className="yes">✓</span> Free diagnosis · £0 if unfixable</li>
                  </ul>
                  <button className="ppq-card-cta" onClick={onOpen}>Get your quote <span aria-hidden="true">→</span></button>
                  <p className="ppq-card-note">Takes ~30 seconds · no card needed</p>
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function App() {
      const [open, setOpen] = React.useState(false);
      const openQuote = () => setOpen(true);
      return (
        <>
          <Nav />
          <ProductBreadcrumb />
          <ProductHeroQuote onOpen={openQuote} />
          <div className="hp-trust-belowhero">
            <TrustBand reviewCount={719} rating={4.9} />
          </div>
          <SymptomConfirm price={PRODUCT.price} />
          <BTSReel mode="reviews" />
          <PriceBreakdown price={PRODUCT.price} />
          <GenuineParts />
          <ProcessSection processLayout="compact" />
          <ThreeWaysIn />
          <WarrantyStrip />
          <ProductFAQ />
          <Location />
          <Footer />

          <button className="ppq-floating" onClick={openQuote}>Get your quote <span aria-hidden="true">→</span></button>

          {open && (
            <QuoteModalV7 onClose={() => setOpen(false)}>
              <QuoteWizard
                startDevice="macbook"
                startFaultId="screen"
                startModelName={PRODUCT.model}
                startPrice={PRODUCT.price}
                hideProgressOnQuote={true}
                renderQuote={(props) => <QuoteTiersV6 {...props} />}
              />
            </QuoteModalV7>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
