<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Desktop Spacing Audit · iCorrect</title>
  <link rel="stylesheet" href="colors_and_type.css" />
  <style>
    body { margin: 0; background: #e9e9e7; font-family: var(--font-sans); color: #171717; }
    .da-head { padding: 32px 40px 8px; }
    .da-head .mono { font: 500 11px var(--font-mono); text-transform: uppercase; letter-spacing: 0.06em; color: #808080; }
    .da-head h1 { font: 600 28px/1.1 var(--font-sans); letter-spacing: -1.2px; margin: 6px 0 8px; }
    .da-head p { font: 400 13px/1.55 var(--font-sans); color: #4d4d4d; max-width: 640px; margin: 0; }
    .da-grid { display: flex; flex-wrap: wrap; gap: 20px; padding: 20px 40px 48px; }
    .da-frame { width: 348px; }
    .da-frame-label { font: 500 11px var(--font-mono); text-transform: uppercase; letter-spacing: 0.05em; color: #4d4d4d; margin-bottom: 6px; }
    .da-shell { width: 346px; height: 300px; overflow: hidden; border-radius: 10px; background: #fff;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.1); }
    .da-shell iframe { width: 1440px; height: 1250px; border: 0; transform: scale(0.24); transform-origin: 0 0; }
  </style>
</head>
<body>
  <div class="da-head">
    <div class="mono">Review · desktop spacing</div>
    <h1>Desktop spacing sweep.</h1>
    <p>Every page rendered at 1440px. The measurement script walks each page's sections and flags padding outliers, stray margins, and uncovered gaps between sections.</p>
  </div>
  <div class="da-grid" id="grid"></div>
  <script>
    const pages = [
      "iCorrect Homepage.html",
      "MacBook Screen Collection.html",
      "MacBook Screen Repair - Product Page.html",
      "MacBook Repairs.html",
      "Liquid Damage Process.html",
      "Board-Level Diagnosis.html",
      "How It Works.html",
      "Why Us.html",
      "Corporate Services.html",
      "Careers.html",
      "Contact.html",
      "Repair Case Study.html",
    ];
    const grid = document.getElementById("grid");
    pages.forEach((p, i) => {
      const wrap = document.createElement("div");
      wrap.className = "da-frame";
      wrap.innerHTML = '<div class="da-frame-label">' + String(i+1).padStart(2,"0") + " · " + p.replace(".html","") + '</div>' +
        '<div class="da-shell"><iframe src="' + p.replace(/"/g, "&quot;") + '" title="' + p + '"></iframe></div>';
      grid.appendChild(wrap);
    });
  </script>
</body>
</html>
